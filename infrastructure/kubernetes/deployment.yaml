apiVersion: v1
kind: ConfigMap
metadata:
  name: aaja-config
  namespace: production
data:
  NODE_ENV: "production"
  CORS_ORIGIN: "https://aaja-live.com"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: aaja-secrets
  namespace: production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://aaja:password@postgres.production:5432/aaja_live"
  REDIS_URL: "redis://redis.production:6379"
  JWT_SECRET: "your-secret-jwt-key"
  STRIPE_SECRET_KEY: "sk_live_xxxxxx"
  STRIPE_PUBLISHABLE_KEY: "pk_live_xxxxxx"
  STRIPE_WEBHOOK_SECRET: "whsec_xxxxxx"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aaja-app
  namespace: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: aaja-app
  template:
    metadata:
      labels:
        app: aaja-app
    spec:
      containers:
      - name: aaja-app
        image: aaja-live:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: aaja-config
        - secretRef:
            name: aaja-secrets
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]

---
apiVersion: v1
kind: Service
metadata:
  name: aaja-app-service
  namespace: production
spec:
  selector:
    app: aaja-app
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
  sessionAffinity: ClientIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aaja-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aaja-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: aaja-app-pdb
  namespace: production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: aaja-app
