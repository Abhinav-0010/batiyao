apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aaja-network-policy
  namespace: production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - namespaceSelector: {}
  - to:
    - podSelector: {}
  - ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aaja-ingress
  namespace: production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/websocket-services: "aaja-app-service"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - aaja-live.com
    - www.aaja-live.com
    secretName: aaja-tls
  rules:
  - host: aaja-live.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aaja-app-service
            port:
              number: 80
  - host: www.aaja-live.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aaja-app-service
            port:
              number: 80
